# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  nginx:
    image: nginx:alpine
    container_name: summarization-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - summarization-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  api-gateway:
    ports: []                 # Hide direct port in production — traffic goes through Nginx
    environment:
      - NODE_ENV=production
      - NLP_SERVICE_URL=http://nlp-service:8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - API_KEY=${API_KEY:-}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-30}
      - REQUEST_TIMEOUT_MS=120000
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  nlp-service:
    ports: []                 # Hide direct port in production
    environment:
      - SUMMARIZATION_PROVIDER=${SUMMARIZATION_PROVIDER:-huggingface}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-Falconsai/text_summarization}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
